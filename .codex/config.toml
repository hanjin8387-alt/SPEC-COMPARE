# ╔══════════════════════════════════════════════════════════════════╗
# ║  PdfSpecDiffReporter — Project-Level Codex Configuration       ║
# ║  Ref: https://developers.openai.com/codex/config-basic         ║
# ║  Ref: https://developers.openai.com/codex/multi-agent          ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── 기본 모델 & 추론 ────────────────────────────────────────────────
model = "gpt-5.3-codex"
model_reasoning_effort = "high"

# ── 승인 정책 ────────────────────────────────────────────────────────
approval_policy = "on-request"

# ── 샌드박스 ─────────────────────────────────────────────────────────
sandbox_mode = "workspace-write"

# ── 웹 검색 비활성화 (오프라인 프로젝트) ─────────────────────────────
web_search = "disabled"

# ── 커뮤니케이션 스타일 ──────────────────────────────────────────────
personality = "pragmatic"

# ── 환경 변수 정책 ───────────────────────────────────────────────────
[shell_environment_policy]
include_only = ["PATH", "HOME", "USERPROFILE", "DOTNET_ROOT", "NUGET_PACKAGES"]

# ══════════════════════════════════════════════════════════════════
#  Feature Flags
# ══════════════════════════════════════════════════════════════════
[features]
multi_agent = true
shell_snapshot = true
unified_exec = true
undo = true

# ══════════════════════════════════════════════════════════════════
#  Agent Roles — 리팩토링 멀티 에이전트 역할 정의
# ── 오케스트레이터 (기본) ──────────────────────────────────────────
[agents.default]
description = "메인 오케스트레이터. 분석 결과를 기반으로 서브 에이전트를 스폰하고 결과를 종합."

# ── 데드코드 제거 에이전트 ─────────────────────────────────────────
[agents.dead-code]
description = "데드 코드 탐지 및 제거. 중복 구현(Levenshtein 3중복, SplitLines 2중복), 미사용 래퍼 클래스/메서드 정리."
config_file = ".codex/agents/dead-code.toml"

# ── 성능 최적화 에이전트 ───────────────────────────────────────────
[agents.performance]
description = "성능 병목 해결. Levenshtein Two-Row 최적화, 불필요한 재정규화 제거, FileShare 수정."
config_file = ".codex/agents/performance.toml"

# ── 아키텍처 개선 에이전트 ─────────────────────────────────────────
[agents.architecture]
description = "구조 리팩토링. 모델 위치 이동, 상수 통합, 가짜 비동기 제거, enum 보완."
config_file = ".codex/agents/architecture.toml"

# ── 보안 검증 에이전트 ─────────────────────────────────────────────
[agents.security]
description = "보안/HC 제약 검증. 예외 메시지 살균, NuGet 감사, PdfPig 커스텀 빌드 확인."
config_file = ".codex/agents/security.toml"

# ── 테스트 커버리지 에이전트 ───────────────────────────────────────
[agents.test-coverage]
description = "누락 테스트 작성. InputValidator, SecureIngestion, TextExtractor, E2E통합 테스트."
config_file = ".codex/agents/test-coverage.toml"

# ── 코드 품질 에이전트 ─────────────────────────────────────────────
[agents.quality]
description = "코드 품질 개선. 일관성, 줄 끝 통일, 불필요 GC.Collect, DateTime.UtcNow 전환."
config_file = ".codex/agents/quality.toml"

# ── 기존 에이전트 (빌드 용도) ──────────────────────────────────────
[agents.explorer]
description = "읽기 전용 코드 탐색 및 구조 분석."
config_file = ".codex/agents/explorer.toml"

[agents.builder]
description = "코드 작성 전문. Pipeline/, Models/, Helpers/ 구현."
config_file = ".codex/agents/builder.toml"

[agents.tester]
description = "유닛 테스트 작성 및 dotnet test 실행."
config_file = ".codex/agents/tester.toml"

[agents.reviewer]
description = "보안 제약 준수 검증."
config_file = ".codex/agents/reviewer.toml"
