name: verify

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore (locked)
        run: dotnet restore PdfSpecDiffReporter.Tests/PdfSpecDiffReporter.Tests.csproj --locked-mode

      - name: Build
        run: dotnet build PdfSpecDiffReporter.Tests/PdfSpecDiffReporter.Tests.csproj -c Release --no-restore --warnaserror

      - name: Test
        run: dotnet test PdfSpecDiffReporter.Tests/PdfSpecDiffReporter.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage"
